<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta

      content="Your Hunny account email has been confirmed. Return to the app and log in."

    <link rel="canonical" href="https://www.hunnyappai.com/auth-confirmed.html" />
    <title>Email Confirmed | Hunny</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <script>
      document.documentElement.classList.add("js");

    <header class="site-header" id="top">
      <div class="header-inner">
        <a class="brand" href="index.html" aria-label="Hunny home">
          <img
            class="brand-logo"
            src="Assets/hunny-logo-color-header.png"
            alt="Hunny"
            width="1254"
            height="1254"
            decoding="async"
          />
        </a>
        <button
          type="button"
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="Open navigation menu"
          data-nav-toggle
        >
          <span class="nav-toggle__bar" aria-hidden="true"></span>
          <span class="nav-toggle__bar" aria-hidden="true"></span>
          <span class="nav-toggle__bar" aria-hidden="true"></span>
        </button>
        <nav id="site-nav" class="nav-main" aria-label="Primary">
          <div class="nav-main__mobile-head">
            <button
              type="button"
              class="nav-main__close"
              aria-label="Close navigation menu"
              data-nav-close
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <ul class="nav-main__list">
            <li><a href="index.html#top">Home</a></li>
            <li><a href="index.html#contact">Contact us</a></li>
            <li><a href="waitlist.html">Waitlist</a></li>
          </ul>
        </nav>
        <button
          type="button"
          class="nav-overlay"
          aria-hidden="true"
          tabindex="-1"
          data-nav-overlay
        ></button>
        <div class="header-actions">
          <span class="ph-badge" title="Community favorite">
            <span class="ph-icon" aria-hidden="true">🏅</span>
            Loved by early users
          </span>
        </div>
      </div>
    </header>

    <main class="page-sub">
      <section class="legal-page" aria-labelledby="auth-confirmed-heading">
        <div class="legal-shell">
          <div class="reveal-on-scroll">
            <p class="legal-page-kicker">Account</p>
            <h1 id="auth-confirmed-heading" class="legal-page-title">Email Confirmed</h1>
          </div>

          <div class="legal-content reveal-on-scroll reveal-on-scroll--d1">
            <section class="legal-section">
              <h2>Your email has been confirmed.</h2>
              <p>Please return to the app and log in.</p>
            </section>
          </div>
        </div>
      </section>

      <footer class="site-footer reveal-on-scroll">
        <div class="footer-row">
          <div class="footer-col">
            <strong>Company</strong>
            <a href="index.html#top">Home</a>
            <a href="waitlist.html">Waitlist</a>
          </div>
          <div class="footer-col footer-col--center">
            <strong>Support</strong>
            <a href="support.html">Support</a>
            <a href="account-deletion.html">Account deletion</a>
          </div>
          <div class="footer-col footer-col--end">

            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms</a>
